<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi bi-person-plus-fill"></i>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Register to start using Smart Parking</p>

    <div *ngIf="errorMsg" class="alert-glass alert-danger mb-3">
      <i class="bi bi-exclamation-circle"></i> {{ errorMsg }}
    </div>
    <div *ngIf="successMsg" class="alert-glass alert-success mb-3">
      <i class="bi bi-check-circle"></i> {{ successMsg }}
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" [(ngModel)]="name" name="name" placeholder="Enter your full name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Mobile Number</label>
        <input type="text" class="form-control" [(ngModel)]="mobile" name="mobile" placeholder="Enter mobile number" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Min. 6 characters" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Vehicle Number</label>
        <input type="text" class="form-control" [(ngModel)]="vehicleNumber" name="vehicleNumber" placeholder="e.g. MH-12-AB-1234" required>
      </div>

      <button type="submit" class="btn btn-gradient w-100 mb-3" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p style="text-align:center; color:var(--text-secondary); font-size:14px;">
      Already have an account?
      <a routerLink="/login" style="color:var(--primary-light); font-weight:600;">Sign In</a>
    </p>
  </div>
</div>
